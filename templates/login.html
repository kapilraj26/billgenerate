<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='style.css') }}">

</head>

<body>

<div class="login-box">

    <h1>Vegetable Billing Login</h1>

    <form method="POST">

        <input type="text"
               name="username"
               placeholder="Username"
               required>

        <br><br>

        <input type="password"
               name="password"
               placeholder="Password"
               required>

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    {% if error %}

    <p style="color:red">
        {{ error }}
    </p>

    {% endif %}

</div>

</body>

</html>
